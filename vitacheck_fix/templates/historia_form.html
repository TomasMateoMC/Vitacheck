{% extends "base.html" %}
{% block title %}Nueva Historia Clínica{% endblock %}

{% block content %}
<h4>Nueva Historia Clínica</h4>

<form method="post">

  <div class="mb-3">
    <label class="form-label">Médico</label>
    <select name="medico_id" class="form-select">
      <option value="">Sin médico asignado</option>
      {% for m in medicos %}
      <option value="{{ m.id }}">{{ m.nombre }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="mb-3">
    <label class="form-label">Tipo</label>
    <input name="tipo" class="form-control" placeholder="Consulta, urgencia, control…">
  </div>

  <div class="mb-3">
    <label class="form-label">Nota</label>
    <textarea name="nota" class="form-control" rows="4" required></textarea>
  </div>

  <button class="btn btn-success">Guardar</button>
  <a href="{{ url_for('historias', patient_id=paciente_id) }}" class="btn btn-secondary">Cancelar</a>

</form>
{% endblock %}
