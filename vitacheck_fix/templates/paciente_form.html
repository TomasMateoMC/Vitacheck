{% extends "base.html" %}
{% block title %}{{ 'Editar Paciente' if paciente else 'Nuevo Paciente' }}{% endblock %}

{% block content %}
<div class="col-md-8 mx-auto">
  <div class="card shadow-sm">
    <div class="card-body">

      <h3 class="fw-bold mb-3">{{ 'Editar' if paciente else 'Nuevo' }} Paciente</h3>

      <form method="post">

        <div class="row">
          <div class="col-md-7 mb-3">
            <label class="form-label">Nombre Completo</label>
            <input name="nombre" class="form-control" required value="{{ paciente.nombre if paciente else '' }}">
          </div>
          <div class="col-md-5 mb-3">
            <label class="form-label">Documento de Identidad</label>
            <input name="documento" class="form-control" required value="{{ paciente.documento if paciente else '' }}">
          </div>
        </div>  

        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label">Fecha de Nacimiento</label>
            <input type="date" name="fecha_nacimiento" class="form-control"
                   value="{{ paciente.fecha_nacimiento if paciente else '' }}">
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Género</label>
            <select name="genero" class="form-select">
              <option value="" {% if not paciente or not paciente.genero %}selected{% endif %}>Seleccione...</option>
              <option value="Masculino" {% if paciente and paciente.genero == 'Masculino' %}selected{% endif %}>Masculino</option>
              <option value="Femenino" {% if paciente and paciente.genero == 'Femenino' %}selected{% endif %}>Femenino</option>
              <option value="Otro" {% if paciente and paciente.genero == 'Otro' %}selected{% endif %}>Otro</option>
            </select>
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Grupo Sanguíneo</label>
            <select name="grupo_sanguineo" class="form-select">
              <option value="" {% if not paciente or not paciente.grupo_sanguineo %}selected{% endif %}>Seleccione...</option>
              {% for grupo in ['A+', 'A-', 'B+', 'B-', 'AB+', 'AB-', 'O+', 'O-'] %}
                <option value="{{ grupo }}" {% if paciente and paciente.grupo_sanguineo == grupo %}selected{% endif %}>{{ grupo }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="row">
          <div class="col-md-5 mb-3">
            <label class="form-label">Teléfono</label>
            <input name="telefono" class="form-control" value="{{ paciente.telefono if paciente else '' }}">
          </div>
          <div class="col-md-7 mb-3">
            <label class="form-label">Correo Electrónico</label>
            <input type="email" name="email" class="form-control" value="{{ paciente.email if paciente else '' }}">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Dirección de Residencia</label>
          <input name="direccion" class="form-control" value="{{ paciente.direccion if paciente else '' }}">
        </div>

        <div class="mb-4">
          <label class="form-label">Alergias / Restricciones Médicas</label>
          <textarea name="alergias" class="form-control" rows="2" placeholder="Describa si el paciente padece de alguna alergia relevante...">{{ paciente.alergias if paciente else '' }}</textarea>
        </div>

        <div class="d-flex justify-content-end gap-2">
          <a class="btn btn-secondary" href="{{ url_for('pacientes') }}">Cancelar</a>
          <button type="submit" class="btn btn-success px-4">Guardar Registro</button>
        </div>

      </form>

    </div>
  </div>
</div>
{% endblock %}
