{% extends "base.html" %} 
{% block title %}Login - Clínica{% endblock %}
{% block content %}

<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card p-4 shadow-sm">
      <h4 class="mb-3 text-center fw-bold">Iniciar Sesión</h4>

      <form method="post">
        <div class="mb-3">
          <label class="form-label">Usuario</label>
          <input class="form-control" name="username" placeholder="Escribe tu usuario..." required>
        </div>

        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input class="form-control" name="password" type="password" placeholder="••••••••" required>
        </div>

        <button class="btn btn-primary w-100 mt-2">Entrar</button>
      </form>

    </div>
  </div>
</div>

{% endblock %}
